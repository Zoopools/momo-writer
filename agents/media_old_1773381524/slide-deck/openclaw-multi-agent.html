<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw 多 Agent 架构</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #0A1929;
            color: #ffffff;
            overflow: hidden;
        }
        
        .presentation {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        
        .slide {
            width: 90vw;
            height: 50.625vw; /* 16:9 aspect ratio */
            max-height: 90vh;
            max-width: 160vh; /* 16:9 aspect ratio */
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            display: none;
        }
        
        .slide.active {
            display: block;
        }
        
        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 100;
        }
        
        .btn {
            background: rgba(0, 229, 255, 0.2);
            color: #00E5FF;
            border: 1px solid #00E5FF;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .btn:hover {
            background: rgba(0, 229, 255, 0.4);
        }
        
        .progress {
            position: fixed;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            color: #90A4AE;
            font-size: 14px;
        }
        
        .instructions {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(10, 25, 41, 0.9);
            padding: 15px;
            border-radius: 5px;
            border: 1px solid #00E5FF;
            font-size: 12px;
            color: #90A4AE;
            z-index: 100;
        }
        
        .instructions h3 {
            color: #00E5FF;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="presentation">
        <div class="slide active" style="background-image: url('01-slide-cover.png');"></div>
        <div class="slide" style="background-image: url('02-slide-what-is-multi-agent.png');"></div>
        <div class="slide" style="background-image: url('03-slide-why-multi-agent.png');"></div>
        <div class="slide" style="background-image: url('04-slide-architecture-overview.png');"></div>
        <div class="slide" style="background-image: url('05-slide-agent-communication.png');"></div>
        <div class="slide" style="background-image: url('06-slide-task-distribution.png');"></div>
        <div class="slide" style="background-image: url('07-slide-usecase-content-creation.png');"></div>
        <div class="slide" style="background-image: url('08-slide-usecase-multiplatform.png');"></div>
        <div class="slide" style="background-image: url('09-slide-usecase-troubleshooting.png');"></div>
        <div class="slide" style="background-image: url('10-slide-performance.png');"></div>
        <div class="slide" style="background-image: url('11-slide-best-practices.png');"></div>
        <div class="slide" style="background-image: url('12-slide-future-directions.png');"></div>
        <div class="slide" style="background-image: url('13-slide-summary.png');"></div>
        <div class="slide" style="background-image: url('14-slide-back-cover.png');"></div>
    </div>
    
    <div class="progress">
        <span id="currentSlide">1</span> / <span id="totalSlides">14</span>
    </div>
    
    <div class="controls">
        <button class="btn" onclick="previousSlide()">← 上一页</button>
        <button class="btn" onclick="nextSlide()">下一页 →</button>
    </div>
    
    <div class="instructions">
        <h3>快捷键</h3>
        <p>← → 或 ↑ ↓：切换幻灯片</p>
        <p>空格键：下一页</p>
        <p>F：全屏显示</p>
    </div>

    <script>
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        const totalSlides = slides.length;
        
        document.getElementById('totalSlides').textContent = totalSlides;
        
        function showSlide(index) {
            slides.forEach((slide, i) => {
                slide.classList.remove('active');
                if (i === index) {
                    slide.classList.add('active');
                }
            });
            document.getElementById('currentSlide').textContent = index + 1;
        }
        
        function nextSlide() {
            currentSlide = (currentSlide + 1) % totalSlides;
            showSlide(currentSlide);
        }
        
        function previousSlide() {
            currentSlide = (currentSlide - 1 + totalSlides) % totalSlides;
            showSlide(currentSlide);
        }
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') {
                nextSlide();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                previousSlide();
            } else if (e.key === 'f' || e.key === 'F') {
                if (document.fullscreenElement) {
                    document.exitFullscreen();
                } else {
                    document.documentElement.requestFullscreen();
                }
            }
        });
        
        // Initialize
        showSlide(0);
    </script>
</body>
</html>
